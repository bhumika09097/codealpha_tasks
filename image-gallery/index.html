  <body>
    <!-- Header -->
    <header>
      <h1>Image Gallery</h1>
      <p>Explore beautiful collections of images.</p>

      <!-- Filter Buttons -->
      <section class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="nature">Nature</button>

        <button class="filter-btn" data-filter="city">City</button>

        <button class="filter-btn" data-filter="animals">Animals</button>

        <button class="filter-btn" data-filter="travel">Travel</button>
      </section>
      <section class="effect-buttons">
        <button class="effect-btn active" data-effect="none">Original</button>

        <button class="effect-btn" data-effect="grayscale(100%)">B&W</button>

        <button class="effect-btn" data-effect="sepia(100%)">Sepia</button>

        <button class="effect-btn" data-effect="contrast(170%)">
          Contrast
        </button>

        <button class="effect-btn" data-effect="brightness(120%)">
          Bright
        </button>

        <button class="effect-btn" data-effect="blur(2px)">Blur</button>

        <button class="effect-btn" data-effect="saturate(180%)">Vibrant</button>
      </section>

      <!-- Gallery -->
      <section class="gallery">
        <div class="gallery-item" data-category="nature">
          <img

            loading="lazy"

    <!-- Lightbox -->
    <div class="lightbox hidden">
      <!-- Close Button -->
      <span
        class="close-btn"
        role="button"
        aria-label="Close Preview"
        tabindex="0"
      >
        <i class="fa-solid fa-xmark"></i>
      </span>

      <!-- Previous Button -->
      <button class="prev-btn" aria-label="Previous Image">
        <i class="fa-solid fa-angle-left"></i>
      </button>

      <!-- Selected Image -->
      <img class="lightbox-img" src="" alt="Preview Image" draggable="false" />

      <!-- Next Button -->
      <button class="next-btn" aria-label="Next Image">
        <i class="fa-solid fa-angle-right"></i>
      </button>

      <!-- Image Counter -->
      <div class="image-count">1 / 8</div>
    </div>
